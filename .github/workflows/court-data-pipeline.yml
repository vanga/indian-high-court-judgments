name: Court Data Pipeline

on:
  schedule:
    # Run at 2:00 AM UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      court_code:
        description: "Court code to process (e.g. 33_10). Leave empty for all courts."
        required: false
        default: ""
      start_date:
        description: "Start date (YYYY-MM-DD). Leave empty to auto-detect from S3."
        required: false
        default: ""
      end_date:
        description: "End date (YYYY-MM-DD). Leave empty for today."
        required: false
        default: ""

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Ensure directories exist
        run: |
          mkdir -p ./data

      - name: Run court data pipeline
        env:
          INPUT_COURT_CODE: ${{ github.event.inputs.court_code }}
          INPUT_START_DATE: ${{ github.event.inputs.start_date }}
          INPUT_END_DATE: ${{ github.event.inputs.end_date }}
        run: |
          ARGS="--s3_sync --max_workers 4"
          if [ -n "$INPUT_COURT_CODE" ]; then
            ARGS="$ARGS --court_code $INPUT_COURT_CODE"
          fi
          if [ -n "$INPUT_START_DATE" ]; then
            ARGS="$ARGS --start_date $INPUT_START_DATE"
          fi
          if [ -n "$INPUT_END_DATE" ]; then
            ARGS="$ARGS --end_date $INPUT_END_DATE"
          fi
          echo "Running: python download.py $ARGS"
          python download.py $ARGS
